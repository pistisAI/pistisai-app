services:
  # Nginx Reverse Proxy - Entry point for all traffic
  nginx-proxy:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.nginx-proxy
    container_name: zoidbot-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/live:/etc/letsencrypt/live:ro
      - ./certbot/archive:/etc/letsencrypt/archive:ro
    networks:
      - cloudllm-network
    restart: unless-stopped
    depends_on:
      - flutter-app
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Static Website and Documentation Container - DEPRECATED
  # This container has been replaced by unified Flutter web architecture
  # All domains now served by flutter-app container:
  # - zoidbot.online: Flutter marketing pages
  # - app.zoidbot.online: Flutter chat interface
  # - docs.zoidbot.online: Flutter documentation
  #
  # Uncomment below if you need to temporarily restore static site functionality
  # static-site:
  #   build:
  #     context: .
  #     dockerfile: config/docker/Dockerfile.static-site
  #   container_name: zoidbot-static-site
  #   volumes:
  #     - ./static_homepage:/usr/share/nginx/html/static:ro
  #     - ./docs-site/dist:/usr/share/nginx/html/docs:ro
  #     - ./config/nginx/nginx-static.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - cloudllm-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "--fail", "http://localhost/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 10s

  # Flutter Web Application Container
  flutter-app:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.flutter-app
    container_name: zoidbot-flutter-app
    volumes:
      - ./build/web:/usr/share/nginx/html:ro
      - ./config/nginx/nginx-flutter.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cloudllm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # API Backend Container (for bridge communication and proxy management)
  api-backend:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.api-backend
    container_name: zoidbot-api-backend
    environment:
      - NODE_ENV=production
      - PORT=8080
      - AUTH0_DOMAIN=dev-xafu7oedkd5wlrbo.us.auth0.com
      - AUTH0_AUDIENCE=https://app.zoidbot.online
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Docker socket for proxy management
    networks:
      - cloudllm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Tunnel-aware Container Base Image (built but not run directly)
  tunnel-container-base:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.streaming-proxy
    image: zoidbot-streaming-proxy:latest
    profiles:
      - build-only # Only built, not started

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot:latest
    container_name: zoidbot-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/live:/etc/letsencrypt/live
      - ./certbot/archive:/etc/letsencrypt/archive
      - ./certbot/logs:/var/log/letsencrypt
    networks:
      - cloudllm-network
    command: certonly --webroot --webroot-path=/var/www/certbot --email support@zoidbot.online --agree-tos --no-eff-email -d zoidbot.online -d app.zoidbot.online -d api.zoidbot.online -d docs.zoidbot.online
    profiles:
      - ssl-setup

networks:
  cloudllm-network:
    driver: bridge
    name: zoidbot-network

volumes:
  certbot-www:
  certbot-live:
  certbot-archive:
  nginx-logs:
  static-logs:
  flutter-logs:
  api-logs:
