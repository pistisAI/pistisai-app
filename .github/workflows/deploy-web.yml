name: "🌐 Web Deploy"

on:
  push:
    branches:
      - main
      - "antigravity/**"
      - "codex/**"
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "config/docker/Dockerfile.web"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: flutter analyze
        run: |
          flutter pub get
          flutter analyze lib/
          echo "✅ Analysis passed"

      - name: flutter test (unit)
        continue-on-error: true
        run: |
          flutter test test/config/ test/models/ test/utils/ test/helpers/ \
            test/services/ test/services/desktop_control/ test/services/avatar/ \
            test/services/vision/ test/services/voice/ \
            test/screens/ test/widgets/ test/widgets/hermes/ test/widgets/voice/ \
            --reporter expanded
          echo "✅ Unit tests passed"

  build_and_deploy:
    needs: analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release --no-tree-shake-icons --no-web-resources-cdn

      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web/
          retention-days: 1

      - name: Deploy to VPS
        if: github.ref_name == 'main'
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST || '31.97.140.7' }}
          VPS_USER: ${{ secrets.VPS_USER || 'pistisai' }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_PRIVATE_KEY:-}" ]; then
            echo "No SSH key available, skipping VPS deploy"
            exit 0
          fi

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host pistisai-vps
            HostName ${VPS_HOST}
            User ${VPS_USER}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

          tar -czf /tmp/web_build.tar.gz -C build/web .
          echo "Upload size: $(wc -c < /tmp/web_build.tar.gz) bytes"
          scp /tmp/web_build.tar.gz pistisai-vps:/tmp/web_build.tar.gz

          ssh pistisai-vps "sudo mkdir -p /opt/pistisai/build/web && sudo rm -rf /opt/pistisai/build/web/* && sudo tar -xzf /tmp/web_build.tar.gz -C /opt/pistisai/build/web/ && sudo rm /tmp/web_build.tar.gz && cd /opt/pistisai/deploy && sudo docker compose --env-file .env build web && sudo docker compose --env-file .env up -d --no-deps web"

          sleep 5
          for i in {1..20}; do
            if curl -sf "http://${VPS_HOST}:3100/health" > /dev/null 2>&1 || curl -sf "https://app.pistisai.app/health" > /dev/null 2>&1; then
              echo "✅ VPS web service healthy"
              exit 0
            fi
            echo "Waiting for container start and health check to propagate... attempt $i/20"
            sleep 3
          done
          echo "❌ VPS web service health check failed"
          exit 1


      - name: Purge Cloudflare cache
        if: always()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_CACHE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ] || [ -z "${CLOUDFLARE_CACHE_PURGE_TOKEN:-}" ]; then
            echo "Missing Cloudflare secrets, skipping cache purge"
            exit 0
          fi
          curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_CACHE_PURGE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            || echo "Cloudflare cache purge failed"
          echo "Cloudflare cache purged"
