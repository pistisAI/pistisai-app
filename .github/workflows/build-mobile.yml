name: "📱 Mobile Build"

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated)"
        required: false
        default: "android,ios"
        type: string

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: flutter analyze
        run: |
          flutter pub get
          flutter analyze lib/
          echo "✅ Analysis passed"

  build_android:
    name: Android Build
    needs: analyze
    if: contains(inputs.platforms, 'android')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/release-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../release-keystore.jks
          EOF

      - name: Flutter Build APK
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build_ios:
    name: iOS Build
    needs: analyze
    if: contains(inputs.platforms, 'ios')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter Build iOS
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30