name: CI
on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'images/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  flutter_analyze:
    name: 'Flutter Analyze'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      - name: flutter analyze
        run: flutter analyze lib/

  flutter_test:
    name: 'Flutter Tests'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [flutter_analyze]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      - name: flutter test
        run: flutter test --reporter expanded

  backend_lint_test:
    name: 'Backend — lint + test'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [flutter_analyze]
    defaults:
      run:
        working-directory: services/api-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: npm ci
        run: npm ci
      - name: lint
        run: npm run lint
      - name: test
        run: npm test

