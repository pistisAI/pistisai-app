name: CI
on: [push, pull_request]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze lib/
      - name: Test
        run: flutter test

