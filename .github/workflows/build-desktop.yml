name: "💻 Desktop Build & Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1). Leave empty for auto-bump."
        required: false
        default: ""
        type: string
      platforms:
        description: "Platforms to build (comma-separated)"
        required: false
        default: "linux,windows,macos"
        type: string
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - "windows/**"
      - "linux/**"
      - "macos/**"
      - ".github/workflows/build-desktop.yml"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: flutter analyze
        run: |
          flutter pub get
          flutter analyze lib/
          echo "✅ Analysis passed"

  set_version:
    name: Set Version
    needs: analyze
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
          else
            VERSION=$(jq -r '.version' assets/version.json)
            IFS='.' read -r -a v <<< "$VERSION"
            v[2]=$((v[2] + 1))
            VERSION="${v[0]}.${v[1]}.${v[2]}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_linux:
    name: Linux Build
    needs: set_version
    if: contains(inputs.platforms, 'linux')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set Version
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 libayatana-appindicator3-dev libsecret-1-dev libcurl4-openssl-dev libnotify-dev zip

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter Build Linux
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package Linux Distributions
        run: |
          sudo apt-get install -y libfuse2
          mkdir -p dist/linux

          STAGING_DIR=$(mktemp -d)
          mkdir -p $STAGING_DIR/pistisai
          cp -r build/linux/x64/release/bundle/* $STAGING_DIR/pistisai/
          tar -czf dist/linux/Pistisai-Linux-x64.tar.gz -C $STAGING_DIR pistisai

          chmod +x scripts/packaging/build_deb.sh || true
          ./scripts/packaging/build_deb.sh || echo "Deb build skipped"

          chmod +x scripts/packaging/build_appimage.sh || true
          ./scripts/packaging/build_appimage.sh || echo "AppImage build skipped"

      - name: Generate Installer Script
        run: |
          chmod +x scripts/packaging/build_installer.sh || true
          ./scripts/packaging/build_installer.sh || echo "Installer script skipped"

      - name: Upload Linux Bundles
        uses: actions/upload-artifact@v5
        with:
          name: linux-bundles
          path: dist/linux/*
          retention-days: 7

  build_windows:
    name: Windows Build
    needs: set_version
    if: contains(inputs.platforms, 'windows')
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set Version
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install vcpkg dependencies (auth0_flutter)
        run: |
          # Use pre-installed vcpkg — do NOT git pull as newer versions removed cpprestsdk
          vcpkg install cpprestsdk boost-system boost-date-time boost-regex --triplet x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" >> $GITHUB_ENV

      - name: Flutter Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Package Portable ZIP
        run: |
          mkdir -p dist/windows
          cd build/windows/x64/runner/Release
          7z a -tzip ${{ github.workspace }}/dist/windows/Pistisai-Windows-x64-portable.zip *
          echo "✅ Portable zip created"

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
          echo "ISCC_PATH=/c/ProgramData/chocolatey/lib/innosetup/tools/ISCC.exe" >> $GITHUB_ENV
          echo "✅ Inno Setup installed"

      - name: Build Windows Installer
        run: |
          if [ -f "windows/installer/Pistisai.iss" ]; then
            ISCC="/c/ProgramData/chocolatey/lib/innosetup/tools/ISCC.exe"
            if [ ! -f "$ISCC" ]; then
              ISCC=$(find /c/ProgramData/chocolatey -name "ISCC.exe" 2>/dev/null | head -1)
            fi
            if [ -f "$ISCC" ]; then
              "$ISCC" windows/installer/Pistisai.iss
              echo "✅ Installer built"
            else
              echo "ISCC not found" >&2
            fi
          else
            echo "No Pistisai.iss found" >&2
          fi

      - name: Upload Windows Bundles
        uses: actions/upload-artifact@v5
        with:
          name: windows-bundles
          path: |
            dist/windows/*.exe
            dist/windows/*.zip
            build/windows/x64/runner/Release/Pistisai.exe
          retention-days: 7

  build_macos:
    name: macOS Build
    needs: set_version
    if: contains(inputs.platforms, 'macos')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set Version
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "" "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter Build macOS
        run: |
          flutter pub get
          flutter build macos --release
        env:
          MACOSX_DEPLOYMENT_TARGET: 11.0

      - name: Package macOS App
        run: |
          mkdir -p dist/macos
          cd build/macos/Build/Products/Release
          zip -r /tmp/Pistisai-macOS-x64.zip pistisai.app
          cp /tmp/Pistisai-macOS-x64.zip ${{ github.workspace }}/dist/macos/
          echo "✅ macOS bundle packaged"

      - name: Upload macOS Bundle
        uses: actions/upload-artifact@v5
        with:
          name: macos-bundles
          path: dist/macos/*.zip
          retention-days: 7

  create_release:
    needs: [set_version, build_linux, build_windows, build_macos]
    if: always() && github.event_name == 'workflow_dispatch' && (needs.build_linux.result == 'success' || needs.build_windows.result == 'success' || needs.build_macos.result == 'success')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Compute version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            VERSION=$(jq -r '.version' assets/version.json)
            IFS='.' read -r -a v <<< "$VERSION"
            v[2]=$((v[2] + 1))
            VERSION="${v[0]}.${v[1]}.${v[2]}"
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi
          echo "tag=v${{ env.VERSION }}" >> $GITHUB_ENV

      - name: Organize artifacts for release
        run: |
          mkdir -p release-assets
          # Copy from each artifact dir, flattening
          for dir in linux-bundles windows-bundles macos-bundles; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release-assets/ 2>/dev/null || true
            fi
          done
          ls -lh release-assets/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: release-assets/*
          tag: "v${{ env.VERSION }}"
          name: "PistisAI v${{ env.VERSION }}"
          artifactErrorsFailBuild: false
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          body: |
            ## PistisAI Desktop v${{ env.VERSION }}

            ### Linux
            - **AppImage**: `Pistisai-Linux-${{ env.VERSION }}-x86_64.AppImage`
            - **Debian/Ubuntu**: `Pistisai-Linux_${{ env.VERSION }}_amd64.deb`
            - **Portable**: `Pistisai-Linux-x64.tar.gz`

            ### Windows
            - **Installer**: `Pistisai-Windows-x64-Setup.exe`
            - **Portable ZIP**: `Pistisai-Windows-x64-portable.zip`

            ### macOS
            - **ZIP**: `Pistisai-macOS-x64.zip`
          token: ${{ secrets.GITHUB_TOKEN }}
