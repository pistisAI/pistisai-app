name: "💻 Desktop Build & Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 10.1.202). Leave empty for auto-bump."
        required: false
        default: ""
        type: string
      platforms:
        description: "Platforms to build (comma-separated)"
        required: false
        default: "linux,windows,macos"
        type: string

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: flutter analyze
        run: |
          flutter pub get
          flutter analyze lib/
          echo "✅ Analysis passed"

  set_version:
    name: Set Version
    needs: analyze
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Compute version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
          else
            VERSION=$(jq -r '.version' assets/version.json)
            IFS='.' read -r -a v <<< "$VERSION"
            v[2]=$((v[2] + 1))
            VERSION="${v[0]}.${v[1]}.${v[2]}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_linux:
    name: Linux Build
    needs: set_version
    if: contains(inputs.platforms, 'linux')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 libayatana-appindicator3-dev libsecret-1-dev libcurl4-openssl-dev libnotify-dev zip

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter Build Linux
        run: |
          flutter pub get
          flutter build linux --release

      - name: Package Linux Distributions
        run: |
          sudo apt-get install -y libfuse2
          mkdir -p dist/linux

          STAGING_DIR=$(mktemp -d)
          mkdir -p $STAGING_DIR/cloudtolocalllm
          cp -r build/linux/x64/release/bundle/* $STAGING_DIR/cloudtolocalllm/
          tar -czf dist/linux/CloudToLocalLLM-Linux-x64.tar.gz -C $STAGING_DIR cloudtolocalllm

          chmod +x scripts/packaging/build_deb.sh
          ./scripts/packaging/build_deb.sh || echo "Deb build skipped"

          chmod +x scripts/packaging/build_appimage.sh
          ./scripts/packaging/build_appimage.sh || echo "AppImage build skipped"

      - name: Generate Installer Script
        run: |
          chmod +x scripts/packaging/build_installer.sh
          ./scripts/packaging/build_installer.sh

      - name: Upload Linux Bundles
        uses: actions/upload-artifact@v5
        with:
          name: linux-bundles
          path: dist/linux/*
          retention-days: 7

  build_windows:
    name: Windows Build
    needs: set_version
    if: contains(inputs.platforms, 'windows')
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        shell: bash
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Windows Dependencies (cpprestsdk+boost)
        shell: pwsh
        timeout-minutes: 30
        run: |
          # auth0_flutter needs cpprestsdk + Boost (system, date_time, regex).
          # windows-2022 has CMake 3.31 (FindBoost exists) but no Boost SDK.
          # Install ALL needed deps via vcpkg with toolchain.
          vcpkg install cpprestsdk boost-system boost-date-time boost-regex --triplet x64-windows
          "CMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Flutter Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Build Windows Installer
        shell: pwsh
        run: ./scripts/packaging/build_windows_installer.ps1

      - name: Upload Windows Bundles
        uses: actions/upload-artifact@v5
        with:
          name: windows-bundles
          path: |
            build/windows/x64/runner/Release/*.msix
            dist/windows/*.exe
          retention-days: 7

  build_macos:
    name: macOS Build
    needs: set_version
    if: contains(inputs.platforms, 'macos')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        run: |
          VERSION=${{ needs.set_version.outputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "" "s/^version: .*/version: $VERSION+${{ github.run_number }}/" pubspec.yaml
          jq ".version = \"$VERSION\" | .build_number = \"${{ github.run_number }}\"" assets/version.json > assets/version.json.tmp && mv assets/version.json.tmp assets/version.json

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter Build macOS
        run: |
          flutter pub get
          flutter build macos --release

      - name: Package macOS App
        run: |
          mkdir -p dist/macos
          cd build/macos/Build/Products/Release
          zip -r /tmp/CloudToLocalLLM-macOS-x64.zip cloudtolocalllm.app
          cp /tmp/CloudToLocalLLM-macOS-x64.zip ${{ github.workspace }}/dist/macos/
          echo "✅ macOS bundle packaged"

      - name: Upload macOS Bundle
        uses: actions/upload-artifact@v5
        with:
          name: macos-bundles
          path: dist/macos/*.zip
          retention-days: 7

  create_release:
    needs: [set_version, build_linux, build_windows, build_macos]
    if: always() && (needs.build_linux.result == 'success' || needs.build_windows.result == 'success' || needs.build_macos.result == 'success')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Compute version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            VERSION=$(jq -r '.version' assets/version.json)
            IFS='.' read -r -a v <<< "$VERSION"
            v[2]=$((v[2] + 1))
            VERSION="${v[0]}.${v[1]}.${v[2]}"
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi
          echo "tag=v${{ env.VERSION }}" >> $GITHUB_ENV

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            linux-bundles/*,
            windows-bundles/*,
            macos-bundles/*
          tag: "v${{ env.VERSION }}"
          name: "Release v${{ env.VERSION }}"
          artifactErrorsFailBuild: false
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          body: |
            ## Desktop Release v${{ env.VERSION }}

            ### Linux
            - **AppImage**: `cloudtolocalllm-${{ env.VERSION }}-x86_64.AppImage`
            - **Debian/Ubuntu**: `CloudToLocalLLM_${{ env.VERSION }}_amd64.deb`
            - **Portable**: `CloudToLocalLLM-Linux-x64.tar.gz`
            - Install script: `curl -fsSL https://cloudtolocalllm.online/install.sh | bash`

            ### Windows
            - **Installer**: `CloudToLocalLLM-Windows-x64-Setup.exe`
            - **Portable ZIP**: `CloudToLocalLLM-Windows-x64.zip`

            ### macOS
            - **DMG**: `CloudToLocalLLM-macOS-x64.dmg`
          token: ${{ secrets.GITHUB_TOKEN }}