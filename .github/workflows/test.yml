name: "🧪 CI — Test & Build Every Branch"

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "docs/**", "images/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "images/**"]

concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  flutter_analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze lib/ || true

  backend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/api-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint || true
      - run: npm test || true
