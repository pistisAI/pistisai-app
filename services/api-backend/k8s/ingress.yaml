apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-backend-ingress
  namespace: Pistisai
  annotations:
    kubernetes.io/ingress.class: 'gce'
    kubernetes.io/ingress.global-static-ip-name: 'Pistisai-static-ip'
    networking.gke.io/managed-certificates: 'Pistisai-certificate'
spec:
  rules:
    - host: api.pistisai.app
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-backend
                port:
                  number: 8080
