[program:api]
command=npm start
directory=/app/code/api-backend
user=pistisai
autostart=true
autorestart=true
stdout_logfile=/run/api.log
stderr_logfile=/run/api.err
environment=PORT="5000",NODE_ENV="production"

[program:streaming]
command=npm start
directory=/app/code/streaming-proxy
user=pistisai
autostart=true
autorestart=true
stdout_logfile=/run/streaming.log
stderr_logfile=/run/streaming.err
environment=PORT="3001",NODE_ENV="production"

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
user=root
autostart=true
autorestart=true
stdout_logfile=/run/nginx.log
stderr_logfile=/run/nginx.err
