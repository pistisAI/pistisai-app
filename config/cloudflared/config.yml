tunnel: 62da6c19-947b-4bf6-acad-100a73de4e0d
ingress:
  # WebSocket connections for streaming
  - hostname: app.pistisai.online
    path: /ws
    service: http://streaming-proxy:3001
  # Main web app
  - hostname: app.pistisai.online
    service: http://web:8080
  # API backend
  - hostname: api.pistisai.online
    service: http://api-backend:8080
  # Streaming proxy direct access
  - hostname: streaming.pistisai.online
    service: http://streaming-proxy:3001
  # Root domain redirects to web app
  - hostname: pistisai.online
    service: http://web:8080
  # Catch-all 404
  - service: http_status:404
